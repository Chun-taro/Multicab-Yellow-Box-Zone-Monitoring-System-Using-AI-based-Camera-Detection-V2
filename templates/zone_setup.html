{% extends "layout.html" %}

{% block page_title %}Zone Configuration{% endblock %}

{% block content %}

<script>
    document.getElementById('status-indicator').innerHTML = `
        <div class="status-badge" style="background: rgba(139, 92, 246, 0.15); color: var(--primary-color); border: 1px solid rgba(139, 92, 246, 0.3);">
            <i class="fas fa-edit"></i>
            <span>Setup Mode</span>
        </div>
    `;
</script>

<div class="card">
    <div class="card-header" style="flex-wrap: wrap; gap:1rem;">
        <span><i class="fas fa-draw-polygon"></i> Draw Yellow Box Zone</span>
        <div class="header-controls" style="display: flex; align-items: center; gap: 1rem;">
            <span id="point-count"
                style="font-size: 0.9rem; font-weight: 500; font-family: 'Outfit', sans-serif;">Points: 0/4</span>
            <button class="btn btn-secondary" onclick="resetZone()"><i class="fas fa-undo"></i> Reset</button>
            <button class="btn btn-primary" onclick="saveZone()"><i class="fas fa-save"></i> Save</button>
        </div>
    </div>
    <div class="card-body"
        style="padding: 1.5rem; display: flex; justify-content: center; flex-direction: column; align-items: center; gap: 1rem;">

        <div
            style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius:8px; padding: 1rem; display:flex; gap:1rem; align-items:center; width:100%;">
            <i class="fas fa-info-circle" style="color: var(--accent-color); font-size:1.5rem;"></i>
            <span style="font-size:0.9rem; color:#e2e8f0;">Click exactly 4 points on the video to define the yellow box
                zone, then click Save.</span>
        </div>

        <div class="video-container"
            style="position: relative; border-radius:8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width:100%; max-width: 800px; aspect-ratio: auto; height:auto;">
            <img id="video-feed" src="{{ url_for('dashboard.video_feed') }}" alt="Live Video Feed"
                style="display: block; width: 100%; height: auto; cursor: crosshair; object-fit: contain;">
            <canvas id="zone-canvas"
                style="position: absolute; top: 0; left: 0; width:100%; height:100%; pointer-events: none;"></canvas>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video-feed');
    const canvas = document.getElementById('zone-canvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    // Resize canvas to match video
    function resizeCanvas() {
        if (!video.clientWidth) return;
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
        redraw();
    }

    // Handle clicks
    video.addEventListener('click', function (event) {
        if (points.length >= 4) return;

        const rect = video.getBoundingClientRect();
        // Calculate coordinate based on actual CSS displayed size
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        points.push({ x, y });
        redraw();
        updateStatus();
    });

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#f59e0b'; // warning-color
        ctx.lineWidth = 3;

        // Draw points
        points.forEach((p, index) => {
            // Draw glow
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(245, 158, 11, 0.3)';
            ctx.fill();

            // Draw center
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#f59e0b';
            ctx.fill();
        });

        // Draw lines
        if (points.length > 0) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            if (points.length === 4) {
                ctx.closePath();
                ctx.stroke();
                ctx.fillStyle = 'rgba(245, 158, 11, 0.15)';
                ctx.fill();
            } else {
                ctx.stroke();
            }
        }
    }

    function resetZone() {
        points = [];
        redraw();
        updateStatus();
    }

    function updateStatus() {
        document.getElementById('point-count').innerText = `Points: ${points.length}/4`;
        if (points.length === 4) {
            document.getElementById('point-count').style.color = 'var(--success-color)';
        } else {
            document.getElementById('point-count').style.color = '';
        }
    }

    function saveZone() {
        if (points.length !== 4) {
            alert("Please draw exactly 4 points to define the zone.");
            return;
        }

        // Convert coordinates to natural image resolution
        const scaleX = video.naturalWidth / video.clientWidth;
        const scaleY = video.naturalHeight / video.clientHeight;

        const realPoints = points.map(p => [
            Math.round(p.x * scaleX),
            Math.round(p.y * scaleY)
        ]);

        fetch('/api/zone', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zone: realPoints })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("Zone configuration saved successfully.");
                    window.location.href = "{{ url_for('dashboard.dashboard') }}";
                } else {
                    alert("Error: " + (data.error || "Unknown error"));
                }
            })
            .catch(err => {
                console.error(err);
                alert("Failed to save zone.");
            });
    }

    window.addEventListener('resize', resizeCanvas);
    video.onload = resizeCanvas;
    setInterval(resizeCanvas, 1000);
</script>
{% endblock %}
