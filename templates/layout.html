<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Box Monitor</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Modern Notification Toast (Kept from previous iteration) */
        .notification-toast {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(23, 30, 43, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(239, 68, 68, 0.15);
            color: #f8fafc;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 10000;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            min-width: 320px;
            pointer-events: none;
            opacity: 0;
        }

        .notification-toast.show {
            top: 24px;
            pointer-events: all;
            opacity: 1;
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .toast-icon {
            color: #ef4444;
            font-size: 1.8rem;
        }

        .toast-message {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .toast-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: #ef4444;
        }

        .toast-details {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Modal Base */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            width: 90%;
            max-width: 900px;
            position: relative;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Drawer Overlay (Mobile) -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- Persistent Sidebar -->
    <aside class="sidebar" id="sidebar-drawer">
        <button class="close-drawer" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
        <div class="brand" style="cursor: pointer;" onclick="window.location.href='{{ url_for('dashboard.landing') }}'">
            <i class="fas fa-video"></i>
            <span>TrafficAI</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="{{ url_for('dashboard.dashboard') }}"
                    class="nav-link {% if request.endpoint == 'dashboard.dashboard' %}active{% endif %}"
                    onclick="closeDrawer()">
                    <i class="fas fa-chart-line"></i>
                    <span>Live Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.reports') }}"
                    class="nav-link {% if request.endpoint == 'dashboard.reports' %}active{% endif %}"
                    onclick="closeDrawer()">
                    <i class="fas fa-chart-pie"></i>
                    <span>Reports & Analytics</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.logs') }}"
                    class="nav-link {% if request.endpoint == 'dashboard.logs' %}active{% endif %}"
                    onclick="closeDrawer()">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Violation Logs</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.zone_setup') }}"
                    class="nav-link {% if request.endpoint == 'dashboard.zone_setup' %}active{% endif %}"
                    onclick="closeDrawer()">
                    <i class="fas fa-vector-square"></i>
                    <span>Zone Setup</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Wrapper Container -->
    <div class="main-wrapper">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <button class="hamburger-menu" onclick="toggleDrawer()">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div id="status-indicator" style="margin-left:auto;"></div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="notification-toast" class="notification-toast" onclick="handleNotificationClick()">
        <div class="toast-content">
            <i class="fas fa-exclamation-triangle toast-icon"></i>
            <div class="toast-message">
                <span class="toast-title">Violation Detected!</span>
                <span id="toast-details" class="toast-details"></span>
            </div>
        </div>
    </div>

    <!-- Global Image Modal -->
    <div id="globalImageModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" aria-label="Close Modal" onclick="closeGlobalModal()"
                style="position: absolute; right: 20px; top: 20px; background: none; border:none; color:white; font-size:24px; cursor:pointer;"><i
                    class="fas fa-times"></i></button>
            <h2 style="font-family: 'Outfit', sans-serif; color:white; margin-bottom:1rem;">Violation Evidence</h2>
            <!-- Wrapper for glow effect -->
            <div
                style="padding: 4px; background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), transparent); border-radius: 12px; display: inline-block;">
                <img id="globalModalImage" class="modal-image" src="" alt="Violation Evidence"
                    style="display: block; max-height: 70vh; max-width:100%;">
            </div>
        </div>
    </div>

    <script>
        function toggleDrawer() {
            document.getElementById('sidebar-drawer').classList.toggle('open');
            document.getElementById('drawer-overlay').classList.toggle('open');
        }

        function closeDrawer() {
            document.getElementById('sidebar-drawer').classList.remove('open');
            document.getElementById('drawer-overlay').classList.remove('open');
        }

        let lastViolationId = 0;
        let currentViolationImage = '';

        function checkNewViolations() {
            fetch('/api/recent_violations')
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        const latest = data[0];
                        const latestId = parseInt(latest.id);

                        if (lastViolationId === 0) {
                            lastViolationId = latestId;
                            return;
                        }

                        if (latestId > lastViolationId) {
                            lastViolationId = latestId;
                            showNotification(latest);
                        }
                    }
                })
                .catch(err => console.error('Error polling violations:', err));
        }

        let toastTimeout;
        function showNotification(violation) {
            const toast = document.getElementById('notification-toast');
            document.getElementById('toast-details').innerText = `Type: ${violation.label || 'Unknown'} - View Image`;
            currentViolationImage = violation.image_path;

            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 6000);
        }

        function handleNotificationClick() {
            if (currentViolationImage) {
                openGlobalModal(currentViolationImage);
                document.getElementById('notification-toast').classList.remove('show');
            }
        }

        function openGlobalModal(imagePath) {
            const modal = document.getElementById('globalImageModal');
            const modalImg = document.getElementById('globalModalImage');

            modalImg.style.opacity = 0;
            setTimeout(() => {
                modalImg.src = '/static/' + imagePath;
                modalImg.onload = () => { modalImg.style.transition = 'opacity 0.3s ease'; modalImg.style.opacity = 1; };
            }, 50);

            modal.style.display = "flex";
        }

        function closeGlobalModal() {
            document.getElementById('globalImageModal').style.display = "none";
        }

        window.onclick = function (event) {
            const modal = document.getElementById('globalImageModal');
            if (event.target == modal) { modal.style.display = "none"; }
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === "Escape") { closeGlobalModal(); closeDrawer(); }
        });

        setInterval(checkNewViolations, 2000);
    </script>
</body>

</html>
